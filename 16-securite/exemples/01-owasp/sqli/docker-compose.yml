# ============================================================================
# Section 16.1 : Injection SQL — base PostgreSQL pour la démonstration
# Description : Un Postgres jetable sur 127.0.0.1:5433 (port non standard pour
#              ne pas heurter une instance locale). Aucun volume : les données
#              sont éphémères, exactement ce qu'on veut pour une démo.
# Fichier source : 16.1 (01-owasp-go.md)
# ============================================================================
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "127.0.0.1:5433:5432"
